<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Cast</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container text-center mt-5">
        <h2 class="text-black">Weather</h2>
        <div class="input-group mt-3">
            <input type="text" id="city" class="form-control" placeholder="Enter city name">
            <button class="btn btn-primary" onclick="getWeather()">Get Weather</button>
        </div>

        <div id="loading" class="d-none">Loading...</div>

        <div id="weatherCard" class="mt-4 p-4 rounded shadow d-none">
            <h3 id="cityName"></h3>
            <h4 id="temperature"></h4>
            <p id="condition"></p>
            <img id="weatherIcon" src="" alt="" class="d-none">

            <div class="row mt-3">
                <div class="col border p-3 rounded shadow">
                    <h5>Humidity</h5>
                    <p id="humidity"></p>
                </div>
                <div class="col border p-3 rounded shadow">
                    <h5>Wind Speed</h5>
                    <p id="windSpeed"></p>
                </div>
                <div class="col border p-3 rounded shadow">
                    <h5>Pressure</h5>
                    <p id="pressure"></p>
                </div>
                <div class="col border p-3 rounded shadow">
                    <h5>Feels Like</h5>
                    <p id="feelsLike"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
