<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Cast</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container text-center mt-5">
        <h2 class="text-black fw-bold">🌤️ Sky Cast - Weather App</h2>

        <label for="city" class="mt-3 fw-semibold">Enter City Name:</label>
        <div class="input-group mt-2">
            <input type="text" id="city" class="form-control" placeholder="E.g., New York, London, Mumbai">
            <button class="btn btn-primary" onclick="getWeather()">Get Weather</button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="mt-3 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Weather Card -->
        <div id="weatherCard" class="mt-4 p-4 rounded shadow d-none bg-white">
            <h3 id="cityName" class="fw-bold"></h3>
            <h4 id="temperature"></h4>
            <p id="condition" class="fs-5 fw-semibold"></p>
            <img id="weatherIcon" src="" alt="Weather Icon" class="d-none mx-auto" width="100">

            <div class="row mt-3 text-center">
                <div class="col border p-3 rounded shadow bg-light">
                    <h5>Humidity</h5>
                    <p id="humidity" class="fs-5 fw-semibold"></p>
                </div>
                <div class="col border p-3 rounded shadow bg-light">
                    <h5>Wind Speed</h5>
                    <p id="windSpeed" class="fs-5 fw-semibold"></p>
                </div>
                <div class="col border p-3 rounded shadow bg-light">
                    <h5>Pressure</h5>
                    <p id="pressure" class="fs-5 fw-semibold"></p>
                </div>
                <div class="col border p-3 rounded shadow bg-light">
                    <h5>Feels Like</h5>
                    <p id="feelsLike" class="fs-5 fw-semibold"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
